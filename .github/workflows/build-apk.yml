name: Build Sesame-AG 64-bit Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias temp-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temppassword -keypass temppassword -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, ST=Temp, C=Temp"

      - name: Build 64-bit Release APK
        run: |
          ./gradlew assembleRelease \
          -x test \
          -x lint \
          -x lintVitalRelease \
          -Pandroid.injected.build.abi=arm64-v8a \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
          -Pandroid.injected.signing.store.password=temppassword \
          -Pandroid.injected.signing.key.alias=temp-alias \
          -Pandroid.injected.signing.key.password=temppassword \
          --no-daemon

      - name: Locate and Upload APK
        run: |
          # 寻找所有生成的 APK 文件并列出路径，以便在日志中确认
          find . -name "*.apk"
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-APK-Output
          path: |
            app/build/outputs/apk/**/*.apk
            **/build/outputs/apk/**/*.apk
