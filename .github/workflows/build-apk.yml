name: Build Sesame-AG Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 新增这一行，强制拉取所有嵌套的子模块

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Temporary Keystore
        # 使用 keytool 动态生成一个临时的 release.keystore 供打包使用
        run: |
          keytool -genkey -v -keystore release.keystore -alias temp-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temppassword -keypass temppassword -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, ST=Temp, C=Temp"

      - name: Build Release APK
        # 通过 -P 参数将刚才生成的临时签名强制注入到打包流程中覆盖默认配置
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=temppassword -Pandroid.injected.signing.key.alias=temp-alias -Pandroid.injected.signing.key.password=temppassword --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-AG-Release-APK
          path: app/build/outputs/apk/release/*.apk
