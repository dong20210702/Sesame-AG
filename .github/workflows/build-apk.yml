name: Build Sesame-AG 64-bit Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fix Missing Submodule (libxposed/api)
        # 手动帮原作者把漏掉的 Xposed API 库克隆到指定位置！
        run: |
          rm -rf libxposed/api
          git clone https://github.com/libxposed/api.git libxposed/api

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias temp-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temppassword -keypass temppassword -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, ST=Temp, C=Temp"

      - name: Build 64-bit Release APK
        # 包含了跳过代码检查和强制 64 位的参数，确保包体最小
        run: ./gradlew assembleRelease -x lint -x test -Pandroid.injected.build.abi=arm64-v8a -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=temppassword -Pandroid.injected.signing.key.alias=temp-alias -Pandroid.injected.signing.key.password=temppassword --no-daemon

      - name: Upload Small Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-AG-arm64-Release-APK
          path: app/build/outputs/apk/release/*.apk
