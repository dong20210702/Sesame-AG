name: Build Sesame-AG 64-bit Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build 64-bit Release APK
        run: |
          ./gradlew clean :app:assembleRelease \
          -x test -x lint -x lintVitalRelease \
          -Pandroid.injected.build.abi=arm64-v8a \
          --no-daemon

      - name: Find and Inspect APK Location
        run: |
          echo "--- Searching for APK files ---"
          find . -name "*.apk"
          echo "--- Inspecting app/build/outputs/apk directory ---"
          ls -R app/build/outputs/apk/ || echo "Directory not found"

      - name: Upload All APKs
        uses: actions/upload-artifact@v4
        with:
          name: Final-APK-Output
          path: |
            app/build/outputs/apk/**/*.apk
            build/outputs/apk/**/*.apk
