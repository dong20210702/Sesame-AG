name: Build Sesame-AG Release APK

on:
  workflow_dispatch: # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest # 对齐 CI 环境

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle' # 对齐 Oracle JDK 17.0.1

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        # 执行 release 编译。项目内的 gradle-wrapper 将会自动下载 Gradle 9.4.0-milestone-3 和配置的 SDK 36。
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Sesame-AG-Release-APK
          path: app/build/outputs/apk/release/*.apk
