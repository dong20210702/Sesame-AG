name: Auto Build On Upstream Update

on:
  workflow_dispatch: # 保持手动触发按钮
  schedule:
    - cron: '0 */3 * * *' # 每 3 小时自动检查一次原作者是否有更新

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Upstream Target Ref
        id: check_ref
        run: |
          # 1. 尝试获取最新的 Release Tag
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/aoguai/Sesame-AG/releases/latest | jq -r .tag_name)
          
          if [ "$UPSTREAM_TAG" != "null" ] && [ -not -z "$UPSTREAM_TAG" ]; then
            echo "找到原作者发布的最新 Release: $UPSTREAM_TAG"
            echo "final_ref=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "artifact_name=Sesame-AG-$UPSTREAM_TAG-arm64" >> $GITHUB_OUTPUT
          else
            # 2. 如果没有 Release，则直接拉取主分支最新代码
            echo "原作者暂未发布 Release，将自动同步主分支最新代码"
            echo "final_ref=main" >> $GITHUB_OUTPUT
            echo "artifact_name=Sesame-AG-Latest-Main-arm64" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Upstream Repository
        uses: actions/checkout@v4
        with:
          repository: 'aoguai/Sesame-AG'
          ref: ${{ steps.check_ref.outputs.final_ref }} # 动态切换：有 Tag 用 Tag，没 Tag 用主分支
          fetch-depth: 0
          submodules: false

      - name: Set up Oracle JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias temp-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass temppassword -keypass temppassword -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, ST=Temp, C=Temp"

      - name: Build 64-bit Release APK
        run: |
          ./gradlew clean :app:assembleRelease \
          -x test -x lint -x lintVitalRelease \
          -Pandroid.injected.build.abi=arm64-v8a \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
          -Pandroid.injected.signing.store.password=temppassword \
          -Pandroid.injected.signing.key.alias=temp-alias \
          -Pandroid.injected.signing.key.password=temppassword \
          --no-daemon

      - name: Find and Filter Release APK
        run: |
          mkdir -p $GITHUB_WORKSPACE/apks_to_upload
          find . -name "*.apk" ! -name "*debug*" -type f -exec cp {} $GITHUB_WORKSPACE/apks_to_upload/ \;
          echo "--- 最终生成的专属 APK 如下 ---"
          ls -lh $GITHUB_WORKSPACE/apks_to_upload/

      - name: Upload Clean Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.check_ref.outputs.artifact_name }}
          path: apks_to_upload/
